name: Backend CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  backend-test:

    runs-on: ubuntu-latest

    env:
      MONGO_URL: ${{ secrets.MONGO_URL }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}

      DATABASE_NAME: ${{ vars.DATABASE_NAME }}
      PROJECT_NAME: ${{ vars.PROJECT_NAME }}
      ALGORITHM: ${{ vars.ALGORITHM }}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${{ vars.ACCESS_TOKEN_EXPIRE_MINUTES }}
      GOOGLE_CREDENTIALS_FILE: app/core/credentials.json

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install uvicorn

      - name: Create Google Credentials File
        run: |
          echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > app/core/credentials.json

      - name: Start FastAPI Server
        run: |
          nohup uvicorn app.main:app --host 127.0.0.1 --port 8000 &

      - name: Wait for server startup
        run: sleep 12

      - name: Test Health Endpoint
        run: curl --retry 5 --retry-delay 5 --fail http://127.0.0.1:8000/health